<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Djib'Shopper - Calculatrice Admin</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; padding: 20px; display: flex; justify-content: center; }
        .admin-box { background: #333; padding: 25px; border-radius: 10px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        h2 { text-align: center; color: #ffeb3b; margin-top: 0; border-bottom: 1px solid #555; padding-bottom: 10px; }
        .row { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; background: #444; padding: 10px; border-radius: 6px; }
        label { font-size: 12px; font-weight: bold; color: #bbb; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border-radius: 4px; border: none; background: #222; color: #fff; font-size: 16px; box-sizing: border-box;}
        button { background: #555; color: white; border: none; padding: 10px; cursor: pointer; font-weight: bold; border-radius: 4px; width: 100%; margin-bottom: 15px;}
        .remove { background: #ff4444; width: auto; padding: 10px 15px; margin: 0;}
        .total-display { background: #000; padding: 20px; text-align: center; border-radius: 8px; border: 2px solid #ffeb3b; }
        .total-display span { display: block; font-size: 30px; font-weight: bold; color: #ffeb3b; }
        .details { font-size: 11px; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>🔒 ADMIN : CALCUL DEVIS</h2>
        <div id="calc-lines">
            <div class="row line">
                <div style="flex: 1;"><label>Prix ($)</label><input type="number" class="p-admin" inputmode="decimal" oninput="calculerAdmin()"></div>
                <div style="flex: 1;"><label>Qte</label><input type="number" class="q-admin" value="1" min="1" oninput="calculerAdmin()"></div>
            </div>
        </div>
        <button onclick="ajouterLigne()">+ Ajouter une ligne</button>
        
        <div class="total-display">
            <span id="resultat">0 FDJ</span>
            <div class="details">Taux: 185 | Frais: 0-4$=400, 5-7$=600, >7$=700</div>
        </div>
    </div>

    <script>
        const TAUX = 185;

        function ajouterLigne() {
            const container = document.getElementById('calc-lines');
            const div = document.createElement('div');
            div.className = 'row line';
            div.innerHTML = `
                <div style="flex: 1;"><label>Prix ($)</label><input type="number" class="p-admin" inputmode="decimal" oninput="calculerAdmin()"></div>
                <div style="flex: 1;"><label>Qte</label><input type="number" class="q-admin" value="1" min="1" oninput="calculerAdmin()"></div>
                <button class="remove" onclick="this.parentElement.remove(); calculerAdmin();">X</button>
            `;
            container.appendChild(div);
        }

        function calculerAdmin() {
            let totalGeneral = 0;
            const lignes = document.querySelectorAll('.line');
            
            lignes.forEach(ligne => {
                let p = parseFloat(ligne.querySelector('.p-admin').value);
                let q = parseInt(ligne.querySelector('.q-admin').value) || 1;

                if (!isNaN(p) && p > 0) {
                    let frais = (p <= 4) ? 400 : (p <= 7) ? 600 : 700;
                    let totalLigne = ((p * TAUX) + frais) * q;
                    totalGeneral += totalLigne;
                }
            });

            document.getElementById('resultat').innerText = Math.round(totalGeneral).toLocaleString() + " FDJ";
        }
    </script>
</body>
</html>
